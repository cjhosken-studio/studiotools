name: Build Studio Tools

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install X11 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxt-dev \
            libgl1-mesa-dev \
            mesa-common-dev \
            libglu1-mesa-dev \
            libglvnd-dev \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create Python virtual environment
        run: python -m venv .venv

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install Pre-Requesists (venv)
        run: .venv/bin/python -m pip install -r ./requirements.txt

      - name: Create USD directory
        run: mkdir usd

      - name: Clone OpenUSD (venv)
        run: git clone https://github.com/PixarAnimationStudios/OpenUSD.git ./usd/source
      
      - name: Build OpenUSD (venv)
        run: .venv/bin/python ./usd/source/build_scripts/build_usd.py ./usd/install/

      # Linux + macOS
      - name: Run launch script (Unix)
        run: |
          chmod +x ./launch.sh
          source .venv/bin/activate
          export QT_QPA_PLATFORM=offscreen
          timeout 10s ./launch.sh || true
        shell: bash
